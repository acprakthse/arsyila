<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Membaca Cerita — Petualangan Arsyila</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Caveat:wght@500;700&family=Patrick+Hand&display=swap" rel="stylesheet" />
<style>
  :root{
    --paper:#fff8e7;
    --ink:#2b2d42;
    --accent:#ef476f;
    --accent-2:#ffd166;
    --accent-3:#06d6a0;
    --accent-4:#a0c4ff;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    font-family:'Fredoka', sans-serif;
    color:var(--ink);
    background:
      radial-gradient(circle at 10% 10%, #ffd6a5 0, transparent 30%),
      radial-gradient(circle at 90% 90%, #caffbf 0, transparent 35%),
      radial-gradient(circle at 50% 50%, #ffafcc 0, transparent 45%),
      var(--paper);
    min-height:100vh;
    padding:100px 20px 60px;
  }

  /* Decor */
  .decor{position:fixed; pointer-events:none; opacity:.35; z-index:0; font-size:50px;}
  .decor-1{top:12%; left:4%; animation:spin 20s linear infinite;}
  .decor-2{top:30%; right:5%; animation:bob 4s ease-in-out infinite;}
  .decor-3{bottom:20%; left:6%; animation:bob 3s ease-in-out infinite;}
  .decor-4{bottom:10%; right:4%; animation:spin 15s linear infinite reverse;}
  @keyframes spin{from{transform:rotate(0);}to{transform:rotate(360deg);}}
  @keyframes bob{0%,100%{transform:translateY(0);}50%{transform:translateY(-15px);}}

  /* Nav */
  nav.topbar{
    position:fixed; top:0; left:0; right:0; z-index:100;
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 32px;
    background:rgba(255,248,231,.92);
    backdrop-filter:blur(8px);
    border-bottom:3px dashed var(--ink);
  }
  .logo{
    font-family:'Caveat', cursive;
    font-size:28px; font-weight:700;
    display:flex; align-items:center; gap:10px;
    color:var(--accent);
    text-decoration:none;
  }
  .logo-icon{
    width:36px;height:36px;
    background:var(--accent-2);
    border:2.5px solid var(--ink);
    border-radius:50%;
    display:grid;place-items:center;
    transform:rotate(-8deg);
    box-shadow:3px 3px 0 var(--ink);
    font-size:20px;
  }
  .nav-back{
    font-family:'Patrick Hand', cursive;
    font-size:18px;
    text-decoration:none; color:var(--ink);
    padding:8px 18px; border:2.5px solid var(--ink); border-radius:24px;
    background:var(--paper);
    box-shadow:3px 3px 0 var(--ink);
    transition:transform .15s ease, box-shadow .15s ease;
  }
  .nav-back:hover{transform:translate(-2px,-2px);box-shadow:5px 5px 0 var(--ink);}

  /* Container */
  .container{
    max-width:820px; margin:0 auto;
    position:relative; z-index:1;
  }

  /* Loader */
  .loader{
    text-align:center; padding:80px 20px;
  }
  .loader-icon{
    font-size:60px;
    display:inline-block;
    animation:spin 1.4s linear infinite;
  }
  .loader p{
    font-family:'Caveat',cursive;
    font-size:26px;
    margin-top:12px;
    color:#666;
  }

  /* Article */
  .article{
    background:var(--paper);
    border:3px solid var(--ink);
    border-radius:28px;
    overflow:hidden;
    box-shadow:10px 10px 0 var(--ink);
    animation:popIn .5s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes popIn{from{transform:scale(.9);opacity:0;}to{transform:scale(1);opacity:1;}}

  .article-hero{
    min-height:280px;
    display:grid; place-items:center;
    border-bottom:3px solid var(--ink);
    position:relative;
    overflow:hidden;
  }
  .article-hero.bg-1{background:linear-gradient(135deg,#ffd6a5,#ef476f);}
  .article-hero.bg-2{background:linear-gradient(135deg,#a0c4ff,#06d6a0);}
  .article-hero.bg-3{background:linear-gradient(135deg,#ffd166,#ef476f);}
  .article-hero.bg-4{background:linear-gradient(135deg,#b5ead7,#0077b6);}
  .article-hero.bg-5{background:linear-gradient(135deg,#cdb4db,#240046);}
  .article-hero.bg-6{background:linear-gradient(135deg,#ffafcc,#ffd166);}

  .article-hero .big-icon{
    font-size:140px;
    filter:drop-shadow(4px 4px 0 var(--ink));
  }
  .article-hero img{
    width:100%; height:auto; max-height:500px;
    object-fit:contain;
    background:#fff;
  }

  .article-body{
    padding:40px 44px;
  }
  @media (max-width:600px){
    .article-body{padding:28px 24px;}
  }

  .tag{
    display:inline-block;
    font-family:'Patrick Hand', cursive;
    font-size:15px;
    background:var(--accent-2);
    border:2.5px solid var(--ink);
    border-radius:24px;
    padding:4px 14px;
    margin-bottom:14px;
    box-shadow:3px 3px 0 var(--ink);
  }
  h1.story-title{
    font-family:'Caveat', cursive;
    font-size:clamp(42px, 7vw, 72px);
    line-height:1;
    color:var(--ink);
    margin-bottom:20px;
  }

  .author-row{
    display:flex; align-items:center; gap:14px;
    padding:16px 0;
    border-top:2px dashed #ddd;
    border-bottom:2px dashed #ddd;
    margin-bottom:28px;
  }
  .author-avatar{
    width:54px; height:54px;
    border-radius:50%;
    border:3px solid var(--ink);
    display:grid; place-items:center;
    font-family:'Fredoka',sans-serif; font-weight:700; font-size:22px;
    box-shadow:3px 3px 0 var(--ink);
  }
  .author-info{flex:1;}
  .author-name{
    font-family:'Caveat', cursive;
    font-size:28px; line-height:1;
    color:var(--ink);
  }
  .author-sub{
    font-family:'Patrick Hand', cursive;
    font-size:15px; color:#777;
    margin-top:2px;
  }

  .story-content{
    font-family:'Patrick Hand', cursive;
    font-size:22px; line-height:1.7;
    color:var(--ink);
    white-space:pre-wrap;
  }
  .story-content::first-letter{
    font-family:'Caveat', cursive;
    font-size:72px; line-height:0.8;
    float:left;
    color:var(--accent);
    padding:8px 10px 0 0;
  }

  /* Reactions */
  .reactions{
    margin-top:36px;
    padding:24px;
    background:var(--paper);
    border:2px dashed var(--ink);
    border-radius:18px;
    text-align:center;
  }
  .reactions-title{
    font-family:'Caveat',cursive;
    font-size:32px;
    color:var(--ink);
    margin-bottom:14px;
  }
  .reaction-btns{
    display:flex; gap:10px; justify-content:center; flex-wrap:wrap;
  }
  .react-btn{
    font-size:28px;
    padding:10px 18px;
    background:#fff;
    border:2.5px solid var(--ink);
    border-radius:50px;
    cursor:pointer;
    box-shadow:3px 3px 0 var(--ink);
    transition:transform .15s ease, box-shadow .15s ease;
    display:flex; align-items:center; gap:6px;
  }
  .react-btn:hover{transform:translate(-2px,-2px); box-shadow:5px 5px 0 var(--ink);}
  .react-btn.tapped{
    background:var(--accent-2);
    animation:pop .4s ease;
  }
  .react-btn .count{
    font-family:'Fredoka',sans-serif;
    font-weight:600;
    font-size:16px;
  }
  @keyframes pop{0%{transform:scale(1);}50%{transform:scale(1.3);}100%{transform:scale(1);}}

  /* Bottom actions */
  .bottom-actions{
    margin-top:40px;
    display:flex; gap:14px; justify-content:center; flex-wrap:wrap;
  }
  .btn{
    font-family:'Fredoka', sans-serif; font-weight:600;
    font-size:16px;
    padding:14px 28px;
    border:3px solid var(--ink);
    border-radius:30px;
    cursor:pointer; text-decoration:none;
    box-shadow:5px 5px 0 var(--ink);
    transition:transform .15s ease, box-shadow .15s ease;
    display:inline-flex; align-items:center; gap:8px;
  }
  .btn:hover{transform:translate(-3px,-3px);box-shadow:8px 8px 0 var(--ink);}
  .btn-primary{background:var(--accent);color:var(--paper);}
  .btn-secondary{background:var(--paper);color:var(--ink);}
  .btn-success{background:var(--accent-3);color:var(--ink);}

  /* Error */
  .error-box{
    text-align:center;
    background:var(--paper);
    border:3px solid var(--ink);
    border-radius:24px;
    padding:50px 36px;
    box-shadow:8px 8px 0 var(--ink);
  }
  .error-box .emoji{font-size:80px;}
  .error-box h2{
    font-family:'Caveat',cursive;
    font-size:50px;
    margin:12px 0 8px;
  }
  .error-box p{
    font-family:'Patrick Hand',cursive;
    font-size:19px; color:#666;
    margin-bottom:24px;
  }

  /* Toast */
  .toast{
    position:fixed; bottom:-100px; left:50%;
    transform:translateX(-50%);
    background:var(--accent-3); color:var(--ink);
    border:3px solid var(--ink);
    border-radius:30px;
    padding:14px 26px;
    box-shadow:5px 5px 0 var(--ink);
    font-family:'Patrick Hand',cursive;
    font-size:17px; z-index:300;
    transition:bottom .4s cubic-bezier(.34,1.56,.64,1);
  }
  .toast.show{bottom:30px;}
</style>
</head>
<body>

<div class="decor decor-1">⭐</div>
<div class="decor decor-2">✨</div>
<div class="decor decor-3">🌟</div>
<div class="decor decor-4">💫</div>

<nav class="topbar">
  <a href="index.html" class="logo">
    <span class="logo-icon">✨</span>
    <span>Petualangan Arsyila</span>
  </a>
  <a href="index.html" class="nav-back">← Semua Cerita</a>
</nav>

<div class="container">
  <!-- Loader -->
  <div id="loader" class="loader">
    <div class="loader-icon">📖</div>
    <p>Membuka buku cerita...</p>
  </div>

  <!-- Article will be rendered here -->
  <article id="articleContent" style="display:none;"></article>

  <!-- Error state -->
  <div id="errorBox" class="error-box" style="display:none;">
    <div class="emoji">🔍</div>
    <h2>Cerita Tidak Ditemukan</h2>
    <p>Wah, cerita yang kamu cari tidak ada di rak. Mungkin sudah dipinjam teman?</p>
    <a href="index.html" class="btn btn-primary">← Kembali ke Semua Cerita</a>
  </div>
</div>

<div class="toast" id="toast">Berhasil!</div>

<script type="module">
  // ========== Parse URL ==========
  const params = new URLSearchParams(window.location.search);
  const storyId = params.get('id');
  const storyType = params.get('type'); // 'sample' or undefined

  const loaderEl = document.getElementById('loader');
  const articleEl = document.getElementById('articleContent');
  const errorEl = document.getElementById('errorBox');

  function showError(msg){
    loaderEl.style.display = 'none';
    articleEl.style.display = 'none';
    errorEl.style.display = 'block';
    if(msg) errorEl.querySelector('p').textContent = msg;
  }

  function showToast(m, c){
    const t = document.getElementById('toast');
    t.textContent = m;
    t.style.background = c || 'var(--accent-3)';
    t.classList.add('show');
    setTimeout(()=> t.classList.remove('show'), 2600);
  }

  if (!storyId) { showError(); throw new Error('no id'); }

  // ========== Escape helper ==========
  function escapeHtml(str){
    if(str == null) return '';
    return String(str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }
  function nl2br(str){ return escapeHtml(str); /* we use white-space:pre-wrap */ }

  // ========== Render story ==========
  function renderStory(s){
    loaderEl.style.display = 'none';
    const age = s.age ? `, ${s.age} tahun` : '';
    const dateStr = s.date || (s.createdAt && s.createdAt.toDate
      ? s.createdAt.toDate().toLocaleDateString('id-ID',{day:'numeric',month:'long',year:'numeric'})
      : 'baru saja');

    const heroContent = (s.drawingUrl || s.drawing)
      ? `<img src="${escapeHtml(s.drawingUrl || s.drawing)}" alt="Gambar: ${escapeHtml(s.title)}">`
      : `<span class="big-icon">${s.icon || '📖'}</span>`;

    const colors = ['#ffd166','#ef476f','#06d6a0','#a0c4ff','#caffbf','#ffafcc'];
    const avatarColor = colors[(s.author||'A').charCodeAt(0) % colors.length];

    articleEl.innerHTML = `
      <div class="article-hero ${s.drawingUrl || s.drawing ? '' : (s.bg || 'bg-1')}">
        ${heroContent}
      </div>
      <div class="article-body">
        <span class="tag">${escapeHtml(s.tag || 'Cerita')}</span>
        <h1 class="story-title">${escapeHtml(s.title)}</h1>

        <div class="author-row">
          <div class="author-avatar" style="background:${avatarColor};">${escapeHtml((s.author||'?')[0].toUpperCase())}</div>
          <div class="author-info">
            <div class="author-name">${escapeHtml(s.author || 'anonim')}${age}</div>
            <div class="author-sub">📅 ${escapeHtml(dateStr)}</div>
          </div>
        </div>

        <div class="story-content">${nl2br(s.content || s.excerpt || '')}</div>

        <div class="reactions">
          <div class="reactions-title">Suka ceritanya? Kasih emoji! ✨</div>
          <div class="reaction-btns" id="reactionBtns">
            <button class="react-btn" data-emoji="❤️">❤️ <span class="count">0</span></button>
            <button class="react-btn" data-emoji="😂">😂 <span class="count">0</span></button>
            <button class="react-btn" data-emoji="🤩">🤩 <span class="count">0</span></button>
            <button class="react-btn" data-emoji="👏">👏 <span class="count">0</span></button>
            <button class="react-btn" data-emoji="🌟">🌟 <span class="count">0</span></button>
          </div>
        </div>

        <div class="bottom-actions">
          <a href="index.html" class="btn btn-secondary">← Cerita Lain</a>
          <a href="tulis.html" class="btn btn-primary">✏️ Tulis Ceritaku Sendiri</a>
        </div>
      </div>
    `;
    articleEl.style.display = 'block';

    // Reaction handler (localStorage-based, per story)
    setupReactions(s.id || storyId);
    // Update page title
    document.title = `${s.title} — Petualangan Arsyila`;
  }

  function setupReactions(id){
    const storageKey = 'arsyila_reactions_' + id;
    let counts = {};
    try { counts = JSON.parse(localStorage.getItem(storageKey) || '{}'); } catch(e){}

    const tappedKey = 'arsyila_reactions_tapped_' + id;
    let tapped = {};
    try { tapped = JSON.parse(localStorage.getItem(tappedKey) || '{}'); } catch(e){}

    document.querySelectorAll('.react-btn').forEach(btn=>{
      const emoji = btn.dataset.emoji;
      const countEl = btn.querySelector('.count');
      countEl.textContent = counts[emoji] || 0;
      if(tapped[emoji]) btn.classList.add('tapped');

      btn.addEventListener('click', ()=>{
        if(tapped[emoji]){
          // untap
          counts[emoji] = Math.max(0, (counts[emoji] || 1) - 1);
          tapped[emoji] = false;
          btn.classList.remove('tapped');
        } else {
          counts[emoji] = (counts[emoji] || 0) + 1;
          tapped[emoji] = true;
          btn.classList.add('tapped');
        }
        countEl.textContent = counts[emoji];
        localStorage.setItem(storageKey, JSON.stringify(counts));
        localStorage.setItem(tappedKey, JSON.stringify(tapped));
      });
    });
  }

  // ========== Load story ==========
  // Priority: Firebase → sessionStorage (sample) → localStorage (local) → error
  (async function load(){
    // 1. Sample stories stored in sessionStorage
    if (storyType === 'sample') {
      const raw = sessionStorage.getItem('arsyila_sample_' + storyId);
      if (raw) {
        try {
          renderStory(JSON.parse(raw));
          return;
        } catch(e){}
      }
      showError('Cerita contoh tidak ada di sesi ini. Kembali ke halaman utama ya.');
      return;
    }

    // 2. Try Firebase
    try {
      const { firebaseConfig, DEMO_MODE } = await import('./firebase-config.js');
      if (!DEMO_MODE) {
        const { initializeApp } = await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js');
        const { getFirestore, doc, getDoc }
          = await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js');
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const snap = await getDoc(doc(db, 'stories', storyId));
        if (snap.exists()) {
          const data = snap.data();
          if (!data.approved) {
            showError('Cerita ini sedang menunggu persetujuan orang tua. Coba lagi nanti ya!');
            return;
          }
          renderStory({ id: snap.id, ...data });
          return;
        }
        showError();
        return;
      }
    } catch(e){
      console.warn('Firebase load gagal, coba localStorage:', e);
    }

    // 3. Fallback localStorage
    try {
      const saved = JSON.parse(localStorage.getItem('arsyila_stories') || '[]');
      const found = saved.find(s => s.id === storyId);
      if (found) { renderStory(found); return; }
    } catch(e){}
    showError();
  })();
</script>

</body>
</html>
